<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoM Электростатика: две сферы</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --danger: #ef4444;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1020, #121a2f);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }
    .card {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 20px;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    input {
      background: #0b1220;
      color: var(--text);
      border: 1px solid #273347;
      border-radius: 8px;
      padding: 8px;
      font-size: 14px;
    }
    button {
      margin-top: 10px;
      width: 100%;
      background: var(--accent);
      color: #07110a;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .result {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
    }
    .error { color: var(--danger); }
    canvas {
      width: 100%;
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #ffffff;
      display: block;
    }
    .footer {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .nav-links {
      margin-bottom: 10px;
    }
    .nav-links a {
      color: var(--accent);
      text-decoration: none;
      margin-right: 15px;
      font-size: 14px;
    }
    .nav-links a:hover {
      text-decoration: underline;
    }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="nav-links">
        <a href="/" style="text-decoration: underline; font-weight: bold;">Сферы</a>
      </div>
      <h1>Метод моментов (две сферы)</h1>
      <div class="muted">
        Расчет выполняется в Python (`main.py`) через API `/api/simulate`, визуализация в браузере.
      </div>

      <div class="grid">
        <label>Панелей сфера 1 (N1)
          <input id="n1" type="number" value="120" min="20" max="500" />
        </label>
        <label>Панелей сфера 2 (N2)
          <input id="n2" type="number" value="120" min="20" max="500" />
        </label>
        <label>Радиус R1, м
          <input id="r1" type="number" value="0.05" step="0.005" min="0.005" />
        </label>
        <label>Радиус R2, м
          <input id="r2" type="number" value="0.05" step="0.005" min="0.005" />
        </label>
        <label>Расстояние центров d, м
          <input id="d" type="number" value="0.20" step="0.01" min="0.02" />
        </label>
        <label>Разность потенциалов ΔV, В
          <input id="dv" type="number" value="100" step="10" />
        </label>
        <label>Сетка поля (ngrid)
          <input id="ngrid" type="number" value="90" min="40" max="220" />
        </label>
        <label>Линий потока (stream seeds)
          <input id="seeds" type="number" value="36" min="12" max="120" />
        </label>
      </div>

      <button id="runBtn">Рассчитать и построить</button>
      <div id="status" class="result"></div>
      <div id="err" class="result error"></div>
      <div class="footer">
        Подсказка: силовые линии направлены от +V к −V.
      </div>
    </div>

    <div class="card">
      <canvas id="cv" width="900" height="700"></canvas>
    </div>
  </div>

  <script>
    function value(id, parser) {
      return parser(document.getElementById(id).value);
    }

    function toPx(x, lim, W) {
      return (x + lim) / (2 * lim) * W;
    }

    function toPy(y, lim, H) {
      return (lim - y) / (2 * lim) * H;
    }

    function drawScene(canvas, payload, seeds) {
      const ctx = canvas.getContext("2d");
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      const lim = payload.lim;
      const nx = payload.grid.nx;
      const ny = payload.grid.ny;
      const v = payload.grid.potential;
      const ex = payload.grid.ex;
      const ey = payload.grid.ey;
      const c1 = payload.geometry.c1;
      const c2 = payload.geometry.c2;
      const r1 = payload.geometry.r1;
      const r2 = payload.geometry.r2;

      function insideSphere(x, y) {
        if (Math.hypot(x - c1[0], y - c1[1]) < r1) return 1;
        if (Math.hypot(x - c2[0], y - c2[1]) < r2) return 2;
        return 0;
      }

      // Heatmap from potential grid (симметрично вокруг 0 В, чтобы цвета были физически понятными).
      let vMin = Infinity;
      let vMax = -Infinity;
      for (let i = 0; i < v.length; i++) {
        if (v[i] < vMin) vMin = v[i];
        if (v[i] > vMax) vMax = v[i];
      }
      const vAbs = Math.max(Math.abs(vMin), Math.abs(vMax), 1e-30);

      // Diverging colormap: blue(-) -> white(0) -> red(+)
      function cmapDiverging(tSigned) {
        // tSigned in [-1, +1]
        const t = Math.max(-1, Math.min(1, tSigned));
        const a = Math.abs(t);
        // white at 0
        const base = 255;
        let r = base, g = base, b = base;
        if (t >= 0) {
          // towards red
          r = 255;
          g = Math.floor(255 * (1 - 0.55 * a));
          b = Math.floor(255 * (1 - 0.85 * a));
        } else {
          // towards blue
          r = Math.floor(255 * (1 - 0.85 * a));
          g = Math.floor(255 * (1 - 0.55 * a));
          b = 255;
        }
        return [r, g, b];
      }

      // Draw potential to a pixel buffer, and mask inside spheres.
      const img = ctx.createImageData(W, H);
      for (let py = 0; py < H; py++) {
        const gy = Math.min(ny - 1, Math.floor(py * ny / H));
        const yWorld = lim - (2 * lim) * (py + 0.5) / H;
        for (let px = 0; px < W; px++) {
          const gx = Math.min(nx - 1, Math.floor(px * nx / W));
          const xWorld = -lim + (2 * lim) * (px + 0.5) / W;

          const idx = (py * W + px) * 4;
          const hit = insideSphere(xWorld, yWorld);
          if (hit !== 0) {
            // Inside conductor: make it neutral light gray so field-lines/pop are visible.
            img.data[idx] = 245;
            img.data[idx + 1] = 245;
            img.data[idx + 2] = 245;
            img.data[idx + 3] = 255;
            continue;
          }

          const idxGrid = gy * nx + gx;
          const tSigned = v[idxGrid] / vAbs;
          const [r, g, b] = cmapDiverging(tSigned);
          img.data[idx] = r;
          img.data[idx + 1] = g;
          img.data[idx + 2] = b;
          img.data[idx + 3] = 215;
        }
      }
      ctx.putImageData(img, 0, 0);

      // Legend: Vmin / 0 / Vmax
      function drawLegend() {
        const pad = 12;
        const w = 180;
        const h = 12;
        const x0 = W - w - pad;
        const y0 = pad;

        // bar
        const grad = ctx.createLinearGradient(x0, y0, x0 + w, y0);
        grad.addColorStop(0.0, "rgb(60,120,255)");
        grad.addColorStop(0.5, "rgb(255,255,255)");
        grad.addColorStop(1.0, "rgb(255,120,60)");
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        ctx.strokeStyle = "rgba(0,0,0,0.25)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x0 - 8, y0 - 8, w + 16, h + 32, 8);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = grad;
        ctx.fillRect(x0, y0, w, h);
        ctx.strokeStyle = "rgba(0,0,0,0.35)";
        ctx.strokeRect(x0, y0, w, h);

        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.font = "12px Arial";
        ctx.textBaseline = "top";
        ctx.fillText(`${(-vAbs).toFixed(1)} В`, x0, y0 + h + 6);
        ctx.fillText(`0`, x0 + w / 2 - 4, y0 + h + 6);
        ctx.fillText(`${(vAbs).toFixed(1)} В`, x0 + w - 48, y0 + h + 6);
        ctx.restore();
      }
      if (typeof ctx.roundRect !== "function") {
        // polyfill-ish for older canvases
        ctx.roundRect = function(x, y, w, h, r) {
          const rr = Math.min(r, w/2, h/2);
          this.beginPath();
          this.moveTo(x + rr, y);
          this.arcTo(x + w, y, x + w, y + h, rr);
          this.arcTo(x + w, y + h, x, y + h, rr);
          this.arcTo(x, y + h, x, y, rr);
          this.arcTo(x, y, x + w, y, rr);
          this.closePath();
          return this;
        };
      }
      drawLegend();

      function idxClamp(x, lo, hi) {
        return Math.max(lo, Math.min(hi, x));
      }

      function fieldInterp(x, y) {
        const tx = (x + lim) / (2 * lim) * (nx - 1);
        const ty = (y + lim) / (2 * lim) * (ny - 1);

        const x0 = idxClamp(Math.floor(tx), 0, nx - 2);
        const y0 = idxClamp(Math.floor(ty), 0, ny - 2);
        const fx = tx - x0;
        const fy = ty - y0;

        const i00 = y0 * nx + x0;
        const i10 = y0 * nx + (x0 + 1);
        const i01 = (y0 + 1) * nx + x0;
        const i11 = (y0 + 1) * nx + (x0 + 1);

        const exv = (1 - fx) * (1 - fy) * ex[i00] + fx * (1 - fy) * ex[i10] + (1 - fx) * fy * ex[i01] + fx * fy * ex[i11];
        const eyv = (1 - fx) * (1 - fy) * ey[i00] + fx * (1 - fy) * ey[i10] + (1 - fx) * fy * ey[i01] + fx * fy * ey[i11];
        return [exv, eyv];
      }

      function sphereHitPoint(prevX, prevY, x, y, which) {
        // Уточняем точку пересечения последнего сегмента с окружностью сферы.
        const cx = which === 1 ? c1[0] : c2[0];
        const cy = which === 1 ? c1[1] : c2[1];
        const rr = which === 1 ? r1 : r2;

        const dx = x - prevX;
        const dy = y - prevY;

        const ox = prevX - cx;
        const oy = prevY - cy;

        const A = dx * dx + dy * dy;
        const B = 2 * (ox * dx + oy * dy);
        const C = ox * ox + oy * oy - rr * rr;

        const D = B * B - 4 * A * C;
        if (A < 1e-18 || D < 0) return [x, y];

        const sqrtD = Math.sqrt(D);
        const t1 = (-B - sqrtD) / (2 * A);
        const t2 = (-B + sqrtD) / (2 * A);

        let t = t1;
        if (t < 0 || t > 1) t = t2;
        t = Math.max(0, Math.min(1, t));

        return [prevX + t * dx, prevY + t * dy];
      }

      function drawArrowAt(p0, p1) {
        // Arrow pointing from p0 -> p1 in world coords.
        const dx = p1[0] - p0[0];
        const dy = p1[1] - p0[1];
        const dm = Math.hypot(dx, dy);
        if (dm < 1e-15) return;

        const px = toPx(p1[0], lim, W);
        const py = toPy(p1[1], lim, H);
        const ang = Math.atan2(-dy / dm, dx / dm);

        const headLen = 10;
        const headAngle = Math.PI / 7;

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px - headLen * Math.cos(ang - headAngle), py - headLen * Math.sin(ang - headAngle));
        ctx.lineTo(px - headLen * Math.cos(ang + headAngle), py - headLen * Math.sin(ang + headAngle));
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function trace(x0, y0, steps = 420, ds = (2 * lim) / 420, dir = +1) {
        // dir=+1: идем по направлению E; dir=-1: против E.
        // Для физической интерпретации (стрелки) мы ВСЕГДА рисуем стрелку от + к -.
        ctx.beginPath();
        ctx.moveTo(toPx(x0, lim, W), toPy(y0, lim, H));

        let x = x0;
        let y = y0;
        let prevX = x;
        let prevY = y;
        const pts = [[x, y]];

        for (let i = 0; i < steps; i++) {
          const [fx, fy] = fieldInterp(x, y);
          const fm = Math.hypot(fx, fy);
          if (!isFinite(fm) || fm < 1e-16) break;

          prevX = x;
          prevY = y;

          x += dir * ds * fx / fm;
          y += dir * ds * fy / fm;

          if (Math.abs(x) > lim || Math.abs(y) > lim) break;

          const hit = insideSphere(x, y);
          if (hit !== 0) {
            const [xh, yh] = sphereHitPoint(prevX, prevY, x, y, hit);
            ctx.lineTo(toPx(xh, lim, W), toPy(yh, lim, H));
            pts.push([xh, yh]);
            break;
          }

          ctx.lineTo(toPx(x, lim, W), toPy(y, lim, H));
          pts.push([x, y]);
        }

        ctx.stroke();

        // Стрелка должна показывать направление поля E (от + к -),
        // поэтому для трассировки dir=-1 стрелку разворачиваем.
        if (pts.length > 25) {
          const midIdx = Math.floor(pts.length / 2);
          const a = pts[Math.max(0, midIdx - 2)];
          const b = pts[midIdx];
          if (dir >= 0) {
            drawArrowAt(a, b);
          } else {
            drawArrowAt(b, a);
          }
        }
      }

      // Streamlines styling
      ctx.strokeStyle = "rgba(0,0,0,0.72)";
      ctx.lineWidth = 1.2;

      // Seeds around positive sphere: go along E
      const nLines = Math.max(12, Math.min(120, seeds));
      for (let k = 0; k < nLines; k++) {
        const a = (2 * Math.PI * k) / nLines;
        const sx = c1[0] + 1.03 * r1 * Math.cos(a);
        const sy = c1[1] + 1.03 * r1 * Math.sin(a);
        trace(sx, sy, 420, (2 * lim) / 420, +1);
      }

      // Дополнительные линии, которые гарантированно ВХОДЯТ в отрицательную сферу
      // с правой стороны и вообще со всех сторон.
      // Здесь стартуем возле "−" сферы, но интегрируем ПРОТИВ поля (dir=-1),
      // чтобы геометрически линия приходила к ней, а стрелка всё равно показывала направление E.
      const nNeg = Math.max(10, Math.floor(nLines / 2));
      for (let k = 0; k < nNeg; k++) {
        const a = (2 * Math.PI * k) / nNeg;
        const sx = c2[0] + 1.03 * r2 * Math.cos(a);
        const sy = c2[1] + 1.03 * r2 * Math.sin(a);
        trace(sx, sy, 420, (2 * lim) / 420, -1);
      }

      // A couple extra seeds on the axis for stability
      trace(c1[0] + 1.06 * r1, c1[1], 420, (2 * lim) / 420, +1);
      trace(c1[0], c1[1] + 1.06 * r1, 420, (2 * lim) / 420, +1);
      trace(c1[0], c1[1] - 1.06 * r1, 420, (2 * lim) / 420, +1);

      function drawSphere(cx, cy, r, label) {
        const px = toPx(cx, lim, W);
        const py = toPy(cy, lim, H);
        const pr = Math.abs(toPx(cx + r, lim, W) - toPx(cx, lim, W));

        ctx.beginPath();
        ctx.arc(px, py, pr, 0, 2 * Math.PI);
        ctx.fillStyle = "rgba(255,255,255,0.98)";
        ctx.fill();
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 2.0;
        ctx.stroke();

        ctx.save();
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillText(label, px, py);
        ctx.restore();
      }

      drawSphere(c1[0], c1[1], r1, "+");
      drawSphere(c2[0], c2[1], r2, "−");
    }

    async function run() {
      const runBtn = document.getElementById("runBtn");
      const statusEl = document.getElementById("status");
      const errEl = document.getElementById("err");
      const cv = document.getElementById("cv");

      errEl.textContent = "";
      statusEl.textContent = "Запрос к Python API...";
      runBtn.disabled = true;

      try {
        const payload = {
          n1: value("n1", (s) => parseInt(s, 10)),
          n2: value("n2", (s) => parseInt(s, 10)),
          r1: value("r1", parseFloat),
          r2: value("r2", parseFloat),
          d: value("d", parseFloat),
          dv: value("dv", parseFloat),
          ngrid: value("ngrid", (s) => parseInt(s, 10))
        };
        const seeds = value("seeds", (s) => parseInt(s, 10));

        const t0 = performance.now();
        const resp = await fetch("/api/simulate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!resp.ok) {
          const msg = await resp.text();
          throw new Error(msg || `HTTP ${resp.status}`);
        }

        const data = await resp.json();
        drawScene(cv, data, seeds);

        const t1 = performance.now();
        statusEl.textContent =
          "Готово (через Python).\n" +
          `Q1 = ${data.q1.toExponential(6)} Кл\n` +
          `Q2 = ${data.q2.toExponential(6)} Кл\n` +
          `Q1 + Q2 = ${(data.q1 + data.q2).toExponential(3)} Кл\n` +
          `C = ${data.capacitance.toExponential(6)} Ф\n` +
          `Время (frontend): ${((t1 - t0) / 1000).toFixed(2)} с`;
      } catch (e) {
        errEl.textContent =
          "Ошибка: " + e.message + "\n" +
          "Проверьте, что запущен сервер Python (например: uvicorn main:app --reload).";
      } finally {
        runBtn.disabled = false;
      }
    }

    document.getElementById("runBtn").addEventListener("click", run);
  </script>
</body>
</html>
