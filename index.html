<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoM Электростатика: две сферы</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --danger: #ef4444;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1020, #121a2f);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }
    .card {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 20px;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    input {
      background: #0b1220;
      color: var(--text);
      border: 1px solid #273347;
      border-radius: 8px;
      padding: 8px;
      font-size: 14px;
    }
    button {
      margin-top: 10px;
      width: 100%;
      background: var(--accent);
      color: #07110a;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .result {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
    }
    .error { color: var(--danger); }
    canvas {
      width: 100%;
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #ffffff;
      display: block;
    }
    .footer {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Метод моментов (две сферы)</h1>
      <div class="muted">
        Расчет выполняется в Python (`main.py`) через API `/api/simulate`, визуализация в браузере.
      </div>

      <div class="grid">
        <label>Панелей сфера 1 (N1)
          <input id="n1" type="number" value="120" min="20" max="500" />
        </label>
        <label>Панелей сфера 2 (N2)
          <input id="n2" type="number" value="120" min="20" max="500" />
        </label>
        <label>Радиус R1, м
          <input id="r1" type="number" value="0.05" step="0.005" min="0.005" />
        </label>
        <label>Радиус R2, м
          <input id="r2" type="number" value="0.05" step="0.005" min="0.005" />
        </label>
        <label>Расстояние центров d, м
          <input id="d" type="number" value="0.20" step="0.01" min="0.02" />
        </label>
        <label>Разность потенциалов ΔV, В
          <input id="dv" type="number" value="100" step="10" />
        </label>
        <label>Сетка поля (ngrid)
          <input id="ngrid" type="number" value="90" min="40" max="220" />
        </label>
        <label>Линий потока (stream seeds)
          <input id="seeds" type="number" value="36" min="12" max="120" />
        </label>
      </div>

      <button id="runBtn">Рассчитать и построить</button>
      <div id="status" class="result"></div>
      <div id="err" class="result error"></div>
      <div class="footer">
        Если сервер не запущен, появится подсказка с командой запуска API.
      </div>
    </div>

    <div class="card">
      <canvas id="cv" width="900" height="700"></canvas>
    </div>
  </div>

  <script>
    function value(id, parser) {
      return parser(document.getElementById(id).value);
    }

    function toPx(x, lim, W) {
      return (x + lim) / (2 * lim) * W;
    }

    function toPy(y, lim, H) {
      return (lim - y) / (2 * lim) * H;
    }

    function drawScene(canvas, payload, seeds) {
      const ctx = canvas.getContext("2d");
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      const lim = payload.lim;
      const nx = payload.grid.nx;
      const ny = payload.grid.ny;
      const v = payload.grid.potential;
      const ex = payload.grid.ex;
      const ey = payload.grid.ey;
      const c1 = payload.geometry.c1;
      const c2 = payload.geometry.c2;
      const r1 = payload.geometry.r1;
      const r2 = payload.geometry.r2;

      // Heatmap from potential grid.
      let vMin = Infinity;
      let vMax = -Infinity;
      for (let i = 0; i < v.length; i++) {
        if (v[i] < vMin) vMin = v[i];
        if (v[i] > vMax) vMax = v[i];
      }

      const img = ctx.createImageData(W, H);
      function cmap(t) {
        const tt = Math.max(0, Math.min(1, t));
        const rr = Math.floor(255 * tt);
        const bb = Math.floor(255 * (1 - tt));
        const gg = Math.floor(220 * (1 - Math.abs(tt - 0.5) * 2));
        return [rr, gg, bb];
      }

      for (let py = 0; py < H; py++) {
        const gy = ny - 1 - Math.min(ny - 1, Math.floor(py * ny / H));
        for (let px = 0; px < W; px++) {
          const gx = Math.min(nx - 1, Math.floor(px * nx / W));
          const idxGrid = gy * nx + gx;
          const t = (v[idxGrid] - vMin) / (vMax - vMin + 1e-30);
          const [r, g, b] = cmap(t);
          const idx = (py * W + px) * 4;
          img.data[idx] = r;
          img.data[idx + 1] = g;
          img.data[idx + 2] = b;
          img.data[idx + 3] = 185;
        }
      }
      ctx.putImageData(img, 0, 0);

      function fieldInterp(x, y) {
        const tx = (x + lim) / (2 * lim) * (nx - 1);
        const ty = (y + lim) / (2 * lim) * (ny - 1);
        const x0 = Math.max(0, Math.min(nx - 2, Math.floor(tx)));
        const y0 = Math.max(0, Math.min(ny - 2, Math.floor(ty)));
        const fx = tx - x0;
        const fy = ty - y0;

        const i00 = y0 * nx + x0;
        const i10 = y0 * nx + (x0 + 1);
        const i01 = (y0 + 1) * nx + x0;
        const i11 = (y0 + 1) * nx + (x0 + 1);

        const exv = (1 - fx) * (1 - fy) * ex[i00] + fx * (1 - fy) * ex[i10] + (1 - fx) * fy * ex[i01] + fx * fy * ex[i11];
        const eyv = (1 - fx) * (1 - fy) * ey[i00] + fx * (1 - fy) * ey[i10] + (1 - fx) * fy * ey[i01] + fx * fy * ey[i11];
        return [exv, eyv];
      }

      function traceLine(x0, y0, sign, skipIfHitsSphere) {
        const steps = 400;
        const ds = (2 * lim) / 260;
        const pts = [];
        let x = x0, y = y0;
        let hitSphere = 0;
        pts.push({px: toPx(x, lim, W), py: toPy(y, lim, H)});

        for (let i = 0; i < steps; i++) {
          const [fx, fy] = fieldInterp(x, y);
          const fm = Math.hypot(fx, fy);
          if (fm < 1e-12) break;
          x += sign * ds * fx / fm;
          y += sign * ds * fy / fm;
          if (Math.abs(x) > lim || Math.abs(y) > lim) break;
          pts.push({px: toPx(x, lim, W), py: toPy(y, lim, H)});
          if (Math.hypot(x - c1[0], y - c1[1]) < r1) { hitSphere = 1; break; }
          if (Math.hypot(x - c2[0], y - c2[1]) < r2) { hitSphere = 2; break; }
        }

        // Skip duplicate lines (e.g. backward trace from − that reaches +)
        if (skipIfHitsSphere && hitSphere === skipIfHitsSphere) return;
        if (pts.length < 2) return;

        // For backward traces (sign=-1), reverse so arrows point in E direction
        if (sign < 0) pts.reverse();

        ctx.beginPath();
        ctx.moveTo(pts[0].px, pts[0].py);
        for (let i = 1; i < pts.length; i++) {
          ctx.lineTo(pts[i].px, pts[i].py);
        }
        ctx.stroke();

        // Draw arrowheads along the line
        const arrowEvery = Math.max(15, Math.floor(pts.length / 4));
        for (let i = arrowEvery; i < pts.length - 2; i += arrowEvery) {
          const dx = pts[i + 1].px - pts[i - 1].px;
          const dy = pts[i + 1].py - pts[i - 1].py;
          const angle = Math.atan2(dy, dx);
          const sz = 5;
          ctx.save();
          ctx.translate(pts[i].px, pts[i].py);
          ctx.rotate(angle);
          ctx.beginPath();
          ctx.moveTo(sz, 0);
          ctx.lineTo(-sz * 0.7, sz * 0.45);
          ctx.lineTo(-sz * 0.7, -sz * 0.45);
          ctx.closePath();
          ctx.fillStyle = "rgba(10,10,10,0.85)";
          ctx.fill();
          ctx.restore();
        }
      }

      ctx.strokeStyle = "rgba(10,10,10,0.85)";
      ctx.lineWidth = 1.0;
      for (let k = 0; k < seeds; k++) {
        const a = 2 * Math.PI * k / seeds;
        // From + sphere: forward along E
        traceLine(c1[0] + 1.03 * r1 * Math.cos(a), c1[1] + 1.03 * r1 * Math.sin(a), +1, 0);
        // From − sphere: backward along E (lines arriving from infinity)
        // Skip if line reaches + sphere (those are duplicates of lines traced above)
        traceLine(c2[0] + 1.03 * r2 * Math.cos(a), c2[1] + 1.03 * r2 * Math.sin(a), -1, 1);
      }

      function drawSphere(cx, cy, r) {
        ctx.beginPath();
        ctx.arc(toPx(cx, lim, W), toPy(cy, lim, H), Math.abs(toPx(cx + r, lim, W) - toPx(cx, lim, W)), 0, 2 * Math.PI);
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fill();
        ctx.strokeStyle = "#111";
        ctx.lineWidth = 1.6;
        ctx.stroke();
      }

      drawSphere(c1[0], c1[1], r1);
      drawSphere(c2[0], c2[1], r2);

      ctx.fillStyle = "#111";
      ctx.font = "14px Arial";
      ctx.fillText("Эквипотенциалы (цвет) + силовые линии E (стрелки: от + к −)", 14, 22);
    }

    async function run() {
      const runBtn = document.getElementById("runBtn");
      const statusEl = document.getElementById("status");
      const errEl = document.getElementById("err");
      const cv = document.getElementById("cv");

      errEl.textContent = "";
      statusEl.textContent = "Запрос к Python API...";
      runBtn.disabled = true;

      try {
        const payload = {
          n1: value("n1", (s) => parseInt(s, 10)),
          n2: value("n2", (s) => parseInt(s, 10)),
          r1: value("r1", parseFloat),
          r2: value("r2", parseFloat),
          d: value("d", parseFloat),
          dv: value("dv", parseFloat),
          ngrid: value("ngrid", (s) => parseInt(s, 10))
        };
        const seeds = value("seeds", (s) => parseInt(s, 10));

        const t0 = performance.now();
        const resp = await fetch("/api/simulate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!resp.ok) {
          const msg = await resp.text();
          throw new Error(msg || `HTTP ${resp.status}`);
        }

        const data = await resp.json();
        drawScene(cv, data, seeds);

        const t1 = performance.now();
        statusEl.textContent =
          "Готово (через Python).\n" +
          `Q1 = ${data.q1.toExponential(6)} Кл\n` +
          `Q2 = ${data.q2.toExponential(6)} Кл\n` +
          `Q1 + Q2 = ${(data.q1 + data.q2).toExponential(3)} Кл\n` +
          `C = ${data.capacitance.toExponential(6)} Ф\n` +
          `Время (frontend): ${((t1 - t0) / 1000).toFixed(2)} с`;
      } catch (e) {
        errEl.textContent =
          "Ошибка: " + e.message + "\n" +
          "Проверьте, что запущен сервер Python (например: uvicorn main:app --reload).";
      } finally {
        runBtn.disabled = false;
      }
    }

    document.getElementById("runBtn").addEventListener("click", run);
  </script>
</body>
</html>
